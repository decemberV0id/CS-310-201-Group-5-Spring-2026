<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab Results</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
 
    h1 { margin-bottom: 20px; }
 
    #patient-info {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #555;
    }
 
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 80%;
    }
 
    th, td {
      border: 1px solid #ccc;
      padding: 10px 16px;
      text-align: center;
    }
 
    th {
      background-color: #4CAF50;
      color: white;
    }
 
    tr:nth-child(even) { background-color: #f2f2f2; }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background-color: #d4edda;
    }

    tr.report-row.expanded {
      background-color: #cdecd6;
    }

    tr.detail-row td {
      background-color: #f7fbf8;
      text-align: left;
      padding: 14px 16px;
      border-top: none;
    }

    .detail-box {
      display: grid;
      grid-template-columns: 120px 1fr;
      row-gap: 8px;
      column-gap: 10px;
      font-size: 0.95rem;
    }

    .detail-label {
      font-weight: bold;
      color: #2f4f3a;
    }

    .detail-value {
      color: #333;
      word-break: break-word;
    }
 
    #status-message {
      margin-top: 20px;
      color: #888;
      font-style: italic;
    }

    /*Hover and Click actions*/
    #details-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    #details-modal.open {
      display: flex;
    }

    #modal-content {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 300px;
      text-align: left;
    }

    #modal-content h3 {
      margin-top: 0;
    }

    #modal-content button {
      margin-top: 16px;
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

  </style>
</head>
<body>
 
  <h1>Lab Results</h1>
 
  <!-- Patient name/ID will be filled in by JS -->
  <div id="patient-info"></div>
 
  <table>
    <thead>
      <tr>
        <th>Test Name</th><th>Status</th><th>Date</th>
      </tr>
    </thead>
    <tbody id="lab-results-body">
      <!-- Rows inserted by JavaScript. A static placeholder was removed to avoid malformed markup. -->
    </tbody>
  </table>
 
  <p id="status-message">Loading lab results...</p>
 
  <script>
    // Fetch lab reports for the current logged-in user.

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function createDetailRow(parentRow) {
      const details = JSON.parse(parentRow.dataset.details);
      const detailRow = document.createElement("tr");
      detailRow.className = "detail-row";
      detailRow.dataset.parentId = parentRow.dataset.rowId;
      const isDoctorView = details.patient_name && details.patient_name.trim() !== "";

      const detailCell = document.createElement("td");
      detailCell.colSpan = isDoctorView ? 4 : 3;
      const patientBlock = isDoctorView
        ? `
          <div class="detail-label">Patient</div>
          <div class="detail-value">${escapeHtml(details.patient_name)}</div>
        `
        : "";

      detailCell.innerHTML = `
        <div class="detail-box">
          ${patientBlock}
          <div class="detail-label">Test Name</div>
          <div class="detail-value">${escapeHtml(details.test_name || "N/A")}</div>
          <div class="detail-label">Status</div>
          <div class="detail-value">${escapeHtml(details.status || "N/A")}</div>
          <div class="detail-label">Date</div>
          <div class="detail-value">${escapeHtml(details.date || "N/A")}</div>
          <div class="detail-label">Notes</div>
          <div class="detail-value">${escapeHtml(details.notes || "No notes available")}</div>
        </div>
      `;

      detailRow.appendChild(detailCell);
      return detailRow;
    }
 
    async function loadLabResults() {
      try {
        const response = await fetch("/reports");
 
        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }
 
        const data = await response.json();
        const patient = data.patient || { name: "", id: "" };
        const results = Array.isArray(data.results) ? data.results : [];
        const isDoctorView = !patient.id && results.some(row => (row.patient_name || "").trim() !== "");

        const headerRow = document.querySelector("table thead tr");
        let patientHeader = document.getElementById("patient-column-header");
        if (isDoctorView && !patientHeader) {
          patientHeader = document.createElement("th");
          patientHeader.id = "patient-column-header";
          patientHeader.textContent = "Patient";
          headerRow.appendChild(patientHeader);
        }
        if (!isDoctorView && patientHeader) {
          patientHeader.remove();
        }
        
        // Display patient info
        document.getElementById("patient-info").textContent = isDoctorView
          ? ""
          : (patient.name || patient.id
              ? `Patient: ${patient.name || "Unknown"}`
              : "Patient information unavailable");
 
        // Populate table rows
        const tbody = document.getElementById("lab-results-body");
        tbody.innerHTML = ""; // Clear any existing rows
 
        results.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.className = "report-row";
          tr.dataset.rowId = String(index);
          tr.dataset.details = JSON.stringify(row); // Store row data for modal
          const patientCell = isDoctorView
            ? `<td>${escapeHtml(row.patient_name || "Unknown")}</td>`
            : "";
          tr.innerHTML = `
            <td>${escapeHtml(row.test_name || "")}</td>
            <td>${escapeHtml(row.status || "")}</td>
            <td>${escapeHtml(row.date || "")}</td>
            ${patientCell}
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("status-message").textContent = results.length
          ? ""
          : "No lab reports found.";
 
      } catch (error) {
        // If the backend isn't available yet, provide three fallback demo reports
        console.warn("Error fetching lab results, using fallback demo data:", error);
        const demoPatient = { name: "Demo Patient", id: "demo-1" };
        const fallbackResults = [
          { test_name: "Complete Blood Count", status: "Completed", date: "2024-04-01", notes: "All values within expected range." },
          { test_name: "Metabolic Panel", status: "Pending", date: "2024-04-02", notes: "Sample received; in processing." },
          { test_name: "Lipid Panel", status: "Completed", date: "2024-03-28", notes: "Slightly elevated LDL; recommend follow-up." }
        ];

        document.getElementById("patient-info").textContent =
          `Patient: ${demoPatient.name}`;

        const tbody = document.getElementById("lab-results-body");
        tbody.innerHTML = "";
        fallbackResults.forEach((row, index) => {
          const tr = document.createElement("tr");
          tr.className = "report-row";
          tr.dataset.rowId = `fallback-${index}`;
          tr.dataset.details = JSON.stringify(row);
          tr.innerHTML = `
            <td>${row.test_name}</td>
            <td>${row.status}</td>
            <td>${row.date}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("status-message").textContent =
          "Displaying demo lab reports because the backend could not be reached.";
      }
    }
    
    // Single event listener for tbody via event delegation.
    // Clicking a row toggles an inline detail row directly under it.
    document.getElementById("lab-results-body").addEventListener("click", function(event) {
      const tr = event.target.closest("tr.report-row");
      if (!tr || !tr.dataset || !tr.dataset.details) return;

      const tbody = this;
      const openDetailRows = tbody.querySelectorAll("tr.detail-row");
      openDetailRows.forEach(row => row.remove());

      const wasExpanded = tr.classList.contains("expanded");
      tbody.querySelectorAll("tr.report-row.expanded").forEach(row => row.classList.remove("expanded"));

      if (!wasExpanded) {
        const detailRow = createDetailRow(tr);
        tr.insertAdjacentElement("afterend", detailRow);
        tr.classList.add("expanded");
      }
    });

    window.onload = loadLabResults;
  </script>
 
</body>
</html>
