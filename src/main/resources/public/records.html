<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Records</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; text-align: center; margin-top: 100px; }
  </style>
</head>

<!-- HEADER -->
<header>
  <div class="logo">
  <div class="logo-icon">🏥</div>
    <span class="logo-text">Green Valley Medical Center</span>
  </div>
  <div class="header-right">
      <span>Patient Portal</span>
      <button class="btn-logout">Log Out</button>
    </div>
  </header>

<body>
<!-- WELCOME BAR -->
  <div class="welcome-bar">
    <div>
      <h1>View Chart</h1>
    </div>
  </div>

  <h2 id="chart"> Chart No: </h2>
  <h2 id="pID"> Patient ID: </h2>
  <h2 id="bp"> Blood Pressure: </h2>
  <h2 id="wt"> Weight: </h2>
  <h2 id="temp"> Temperature(F):</h2>
  <h2 id="balance"> Balance: </h2>
  <h2 id="rx"> Prescriptions: </h2>
  <h2 id="results"> Test Results: </h2>
  <h2 id="notes"> Notes: </h2>
</body>
