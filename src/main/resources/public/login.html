<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Aloe Portal Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #dff5ec, #f4fffa);
    }

    .login-container {
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    .logo {
      font-size: 36px;
      margin-bottom: 10px;
    }

    h1 {
      margin-bottom: 25px;
      color: #1a7c5e;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #1abc9c;
      box-shadow: 0 0 0 2px rgba(26, 188, 156, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #1abc9c, #16a085);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .success {
      color: #1a7c5e;
    }

    .error {
      color: #d9534f;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">🌿</div>
    <h1>Aloe Portal</h1>

    <form id="myform">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div id="result" class="message"></div>
  </div>

  <script>
    document.getElementById("myform").addEventListener("submit", function(e) {
      e.preventDefault();

      let formData = new FormData(this);

      fetch("/login", {
        method: "POST",
        body: formData
      })
      .then(response => response.text())
      .then(text => {
        // Show the message from server
        document.getElementById("result").innerHTML = text;

        // If server said "Welcome" → auto redirect after 1 second
        if (text.includes("Welcome")) {
          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1000);
        }
      })
      .catch(err => {
        document.getElementById("result").innerHTML = "Error: could not connect";
      });
    });
  </script>

</body>
</html>
