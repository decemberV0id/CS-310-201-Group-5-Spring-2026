<body>

<h2 style="padding:10px;">Inbox</h2>
<div id="messagesContainer"></div>

<div class="compose" id="composeBar">Click here to send a new message…</div>

<div id="modal" style="display:none;">
  <input id="recipient" placeholder="Recipient"><br><br>
  <textarea id="body"></textarea><br>
  <button onclick="sendMessage()">Send</button>
  <button onclick="closeModal()">Cancel</button>
</div>

<script>
const container = document.getElementById("messagesContainer");
const modal = document.getElementById("modal");

async function loadMessages() {
  const res = await fetch("/messages/me");
  if (!res.ok) {
    container.innerHTML = "<p>Error loading messages</p>";
    return;
  }

  const messages = await res.json();
  container.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = `
      <strong>From:</strong> ${msg.sender}<br>
      <small>${new Date(msg.created_at).toLocaleString()}</small>
      <div class="message-body">${msg.body}</div>
    `;
    div.onclick = () => div.classList.toggle("selected");
    container.appendChild(div);
  });
}

document.getElementById("composeBar").onclick = () => modal.style.display = "block";

function closeModal() {
  modal.style.display = "none";
}

async function sendMessage() {
  const recipient = document.getElementById("recipient").value;
  const body = document.getElementById("body").value;

  const data = new URLSearchParams();
  data.append("recipient", recipient);
  data.append("body", body);

  await fetch("/messages", { method: "POST", body: data });

  closeModal();
  loadMessages();
}

loadMessages();
</script>

</body>
</html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EHR Messages</title>
  <style>
    body { font-family: Arial; background: #f4f6f8; margin: 0; }
    .message { background: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
    .message.selected { border: 2px solid #2e9f4f; }
    .message-body { display: none; margin-top: 5px; }
    .message.selected .message-body { display: block; }
