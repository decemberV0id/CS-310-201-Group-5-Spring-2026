<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --panel: #ffffff;
      --panel-alt: #f7f9fc;
      --line: #d7dce3;
      --text: #1f2a36;
      --muted: #6a7685;
      --accent: #1565c0;
      --mine: #d9ecff;
      --theirs: #eceff3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #f7fbff, var(--bg));
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
      max-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fefefe, #f5f9ff);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .sidebar-header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .conversation-list {
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 10px;
      text-align: left;
      background: transparent;
      padding: 12px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .conversation-item:hover {
      background: var(--panel-alt);
      border-color: #e2e8f0;
    }

    .conversation-item.active {
      background: #eaf3ff;
      border-color: #b6d5f7;
    }

    .conversation-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #0f2238;
    }

    .conversation-preview {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      background: var(--panel-alt);
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      font-size: 18px;
      font-weight: 700;
    }

    .chat-messages {
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 4px;
    }

    .bubble-wrap.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.theirs {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      line-height: 1.35;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-wrap.mine .bubble {
      background: var(--mine);
      border-bottom-right-radius: 4px;
    }

    .bubble-wrap.theirs .bubble {
      background: var(--theirs);
      border-bottom-left-radius: 4px;
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .chat-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    #sendBtn {
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    #sendBtn:hover {
      opacity: 0.9;
    }

    #sendBtn:active {
      opacity: 0.8;
    }

    .empty {
      padding: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 44vh 56vh;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .bubble-wrap {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Conversations</h2>
        <p id="currentUserLabel">Loading user...</p>
      </div>
      <div class="conversation-list" id="conversationList"></div>
    </aside>

    <section class="chat">
      <div class="chat-header" id="chatHeader">Select a conversation</div>
      <div class="chat-messages" id="chatMessages">
        <div class="empty">Pick a conversation on the left to view messages.</div>
      </div>
      <div class="chat-footer">
        <input type="text" id="messageInput" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
      </div>
    </section>
  </main>

  <script>
    const conversationList = document.getElementById("conversationList");
    const chatHeader = document.getElementById("chatHeader");
    const chatMessages = document.getElementById("chatMessages");
    const currentUserLabel = document.getElementById("currentUserLabel");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let currentUser = "";
    let conversations = [];
    let selectedConversation = null;

    function safeText(value) {
      return (value ?? "").toString();
    }

    function formatTime(value) {
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return safeText(value);
      return dt.toLocaleString();
    }

    function isMessageRead(message) {
      return Number(message?.is_read) === 1 || message?.is_read === true;
    }

    function groupConversations(messages) {
      const map = new Map();

      messages.forEach(message => {
        const sender = safeText(message.sender);
        const recipient = safeText(message.recipient);
        const other = sender === currentUser ? recipient : sender;

        if (!map.has(other)) {
          map.set(other, []);
        }

        map.get(other).push(message);
      });

      const groups = [];

      map.forEach((items, otherUser) => {
        items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        const latest = items[items.length - 1];
        const unreadCount = items.filter(item => {
          return safeText(item.sender) === otherUser
            && safeText(item.recipient) === currentUser
            && !isMessageRead(item);
        }).length;

        groups.push({
          otherUser,
          items,
          latest,
          latestTs: latest ? new Date(latest.created_at).getTime() || 0 : 0,
          unreadCount
        });
      });

      groups.sort((a, b) => b.latestTs - a.latestTs);
      return groups;
    }

    function renderConversationList() {
      conversationList.innerHTML = "";

      if (conversations.length === 0) {
        conversationList.innerHTML = '<div class="empty">No messages yet.</div>';
        return;
      }

      conversations.forEach(convo => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "conversation-item" + (selectedConversation === convo.otherUser ? " active" : "");

        const latestBody = convo.latest ? safeText(convo.latest.body) : "";
        const unreadLabel = convo.unreadCount > 0 ? ` • ${convo.unreadCount} unread` : "";

        btn.innerHTML = `
          <div class="conversation-title">${convo.otherUser}${unreadLabel}</div>
          <div class="conversation-preview">${latestBody}</div>
        `;

        btn.addEventListener("click", async () => {
          await openConversation(convo.otherUser);
        });

        conversationList.appendChild(btn);
      });
    }

    function renderChat() {
      chatMessages.innerHTML = "";

      if (!selectedConversation) {
        chatHeader.textContent = "Select a conversation";
        chatMessages.innerHTML = '<div class="empty">Pick a conversation on the left to view messages.</div>';
        return;
      }

      const convo = conversations.find(c => c.otherUser === selectedConversation);

      if (!convo) {
        chatHeader.textContent = "Conversation unavailable";
        chatMessages.innerHTML = '<div class="empty">Conversation no longer exists.</div>';
        return;
      }

      chatHeader.textContent = "Chat with " + convo.otherUser;

      convo.items.forEach(msg => {
        const mine = safeText(msg.sender) === currentUser;
        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap " + (mine ? "mine" : "theirs");

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = safeText(msg.body);

        const meta = document.createElement("div");
        meta.className = "bubble-meta";
        const readStatus = isMessageRead(msg) ? "Read" : "Not read";
        meta.textContent = (mine ? "You" : safeText(msg.sender)) + " • " + formatTime(msg.created_at) + " • " + readStatus;

        wrap.appendChild(bubble);
        wrap.appendChild(meta);
        chatMessages.appendChild(wrap);
      });

      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function markConversationAsRead(otherUser) {
      const formData = new FormData();
      formData.append("otherUser", otherUser);

      const response = await fetch("/messages/read", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error("Failed to mark messages as read");
      }

      const convo = conversations.find(c => c.otherUser === otherUser);
      if (!convo) return;

      convo.items.forEach(item => {
        if (
          safeText(item.sender) === otherUser
          && safeText(item.recipient) === currentUser
        ) {
          item.is_read = 1;
        }
      });
      convo.unreadCount = 0;
    }

    async function openConversation(otherUser) {
      selectedConversation = otherUser;
      try {
        await markConversationAsRead(otherUser);
      } catch (error) {
        console.error(error);
      }
      renderConversationList();
      renderChat();
    }

    async function sendMessage() {
      if (!selectedConversation) {
        alert("Select a conversation first");
        return;
      }

      const body = messageInput.value.trim();
      if (!body) return;

      const formData = new FormData();
      formData.append("recipient", selectedConversation);
      formData.append("body", body);

      try {
        const response = await fetch("/messages/send", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const errorData = await response.json();
          alert("Error: " + (errorData.error || "Failed to send"));
          return;
        }

        const newMsg = await response.json();
        messageInput.value = "";

        const convo = conversations.find(c => c.otherUser === selectedConversation);
        if (convo) {
          newMsg.is_read = newMsg.is_read !== undefined ? newMsg.is_read : 0;
          convo.items.push(newMsg);
          convo.latest = newMsg;
          convo.latestTs = new Date(newMsg.created_at).getTime() || 0;
          convo.unreadCount = convo.items.filter(item => {
            return safeText(item.sender) === convo.otherUser
              && safeText(item.recipient) === currentUser
              && !isMessageRead(item);
          }).length;

          renderConversationList();
          renderChat();
        }
      } catch (error) {
        console.error(error);
        alert("Failed to send message");
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function loadMessages() {
      try {
        const response = await fetch("/messages", { method: "POST" });
        let payload = { currentUser: "Current user", messages: [] };
        try {
          payload = await response.json();
        } catch (parseError) {
          if (!response.ok) {
            throw new Error("Failed to load messages: " + response.status);
          }
        }
        const data = Array.isArray(payload.messages) ? payload.messages : [];

        currentUser = safeText(payload.currentUser || "Current user");
        currentUserLabel.textContent = "Logged in as: " + currentUser;

        if (data.length === 0) {
          currentUserLabel.textContent = "No messages found";
          conversations = [];
          selectedConversation = null;
          renderConversationList();
          renderChat();
          return;
        }

        conversations = groupConversations(data);
        selectedConversation = conversations.length > 0 ? conversations[0].otherUser : null;

        renderConversationList();
        if (selectedConversation) {
          await openConversation(selectedConversation);
        } else {
          renderChat();
        }
      } catch (error) {
        console.error(error);
        currentUserLabel.textContent = "Unable to load messages";
        conversationList.innerHTML = '<div class="empty">Error loading conversations.</div>';
        chatHeader.textContent = "Messages unavailable";
        chatMessages.innerHTML = '<div class="empty">Try refreshing the page.</div>';
      }
    }

    loadMessages();
  </script>
</body>
</html>
