<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medications</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }

    h1 { margin-bottom: 20px; }

    #medication-info {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #555;
    }

    .patient-section {
      width: 80%;
      margin: 0 auto 28px;
      text-align: left;
      background: #ffffff;
      border: 1px solid #dbe8df;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .patient-header {
      background: #f3faf6;
      padding: 12px 16px;
      border-bottom: 1px solid #dbe8df;
      font-weight: bold;
      color: #2f4f3a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
    }

    th, td {
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
      text-align: center;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    tr:nth-child(even) { background-color: #f9fbfa; }

    #status-message {
      margin-top: 20px;
      color: #888;
      font-style: italic;
    }

    @media (max-width: 768px) {
      body {
        margin-top: 24px;
        padding: 0 10px;
      }

      .patient-section {
        width: 100%;
      }

      table {
        font-size: 0.92rem;
      }

      th, td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>

  <h1>Medications</h1>
  <div id="medication-info"></div>
  <div id="medication-content"></div>
  <p id="status-message">Loading medications...</p>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildMedicationTableRows(medications) {
      if (!medications.length) {
        return `
          <tr>
            <td colspan="4">No medications found.</td>
          </tr>
        `;
      }

      return medications.map((med) => `
        <tr>
          <td>${escapeHtml(med.medicine_name || "")}</td>
          <td>${escapeHtml(med.frequency || "")}</td>
          <td>${escapeHtml(med.date_prescribed || "")}</td>
          <td>${escapeHtml(med.notes || "")}</td>
        </tr>
      `).join("");
    }

    function renderPatientView(data) {
      const patient = data.patient || { id: "", name: "" };
      const medications = Array.isArray(data.medications) ? data.medications : [];

      document.getElementById("medication-info").textContent =
        patient.name || patient.id
          ? `Patient: ${patient.name || "Unknown"}`
          : "Patient information unavailable";

      document.getElementById("medication-content").innerHTML = `
        <div class="patient-section">
          <table>
            <thead>
              <tr>
                <th>Medication</th>
                <th>Frequency</th>
                <th>Date Prescribed</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody>
              ${buildMedicationTableRows(medications)}
            </tbody>
          </table>
        </div>
      `;

      document.getElementById("status-message").textContent = medications.length ? "" : "No medications found.";
    }

    function renderDoctorView(data) {
      const patients = Array.isArray(data.patients) ? data.patients : [];

      document.getElementById("medication-info").textContent = "Patients and Medications";

      if (!patients.length) {
        document.getElementById("medication-content").innerHTML = "";
        document.getElementById("status-message").textContent = "No patients with appointments found.";
        return;
      }

      document.getElementById("medication-content").innerHTML = patients.map((patient) => {
        const medications = Array.isArray(patient.medications) ? patient.medications : [];

        return `
          <section class="patient-section">
            <div class="patient-header">${escapeHtml(patient.name || "Unknown Patient")}</div>
            <table>
              <thead>
                <tr>
                  <th>Medication</th>
                  <th>Frequency</th>
                  <th>Date Prescribed</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                ${buildMedicationTableRows(medications)}
              </tbody>
            </table>
          </section>
        `;
      }).join("");

      document.getElementById("status-message").textContent = "";
    }

    async function loadMedications() {
      try {
        const response = await fetch("/medications");

        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }

        const data = await response.json();

        if ((data.role || "").toLowerCase() === "doctor") {
          renderDoctorView(data);
        } else {
          renderPatientView(data);
        }
      } catch (error) {
        console.warn("Error fetching medications:", error);

        document.getElementById("medication-info").textContent = "";
        document.getElementById("medication-content").innerHTML = "";
        document.getElementById("status-message").textContent = "Unable to load medications.";
      }
    }

    loadMedications();
  </script>
</body>
</html>
