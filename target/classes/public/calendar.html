<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Calendar</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
    table { margin: 20px auto; border-collapse: collapse; }
    th, td { width: 50px; height: 50px; border: 1px solid #ccc; vertical-align: middle; }
    th { background: #e0e0e0; font-weight: bold; }
    .today { background: #fffacd; font-weight: bold; }
    .event-day { background: #e6ffe6; font-weight: bold; }
    button.day-btn { width: 100%; height: 100%; border: none; background: transparent; font-size: 16px; cursor: pointer; }
    button.day-btn:hover { background: #e6f3ff; }
    #day-info { 
      margin-top: 30px; padding: 20px; max-width: 500px; margin-left: auto; margin-right: auto;
      background: white; border: 1px solid #ddd; border-radius: 8px; min-height: 120px; text-align: left;
    }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>

  <h2 id="month-year">Month Year</h2>

  <button class="nav" onclick="prevMonth()">← Previous</button>
  <button class="nav" onclick="nextMonth()">Next →</button>

  <table>
    <thead>
      <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
        <th>Thu</th><th>Fri</th><th>Sat</th>
      </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
  </table>

  <div id="day-info">Loading...</div>

  <script>
    let currentDate = new Date();
    let eventDays = {};

    async function fetchAppointments() {
      const infoDiv = document.getElementById("day-info");
      infoDiv.innerHTML = "Loading appointments...";

      try {
        const response = await fetch("/calendar", {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });

        if (!response.ok) {
          throw new Error("Server returned " + response.status);
        }

        eventDays = await response.json();
        console.log("Received from server:", eventDays);

        renderCalendar();
        infoDiv.innerHTML = `<span class="success"> Loaded successfully (${Object.keys(eventDays).length} days with events)</span>`;

      } catch (err) {
        console.error("Fetch error:", err);
        infoDiv.innerHTML = `<span class="error">Error loading appointments.<br>${err.message}</span>`;
      }
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById("month-year").textContent = 
        currentDate.toLocaleString("default", { month: "long", year: "numeric" });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();

      const body = document.getElementById("calendar-body");
      body.innerHTML = "";

      let row = document.createElement("tr");

      for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement("td"));

      for (let day = 1; day <= daysInMonth; day++) {
        let td = document.createElement("td");
        let btn = document.createElement("button");
        btn.className = "day-btn";
        btn.textContent = day;

        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          td.className = "today";
        }
        if (eventDays[dateKey]) {
          td.className += " event-day";
        }

        btn.onclick = () => {
          const info = document.getElementById("day-info");
          if (eventDays[dateKey]) {
            info.innerHTML = `<strong>${dateKey}</strong><br><br>Events:<br>${eventDays[dateKey]}`;
          } else {
            info.innerHTML = `<strong>${dateKey}</strong><br>No appointments scheduled.`;
          }
        };

        td.appendChild(btn);
        row.appendChild(td);

        if ((firstDay + day) % 7 === 0) {
          body.appendChild(row);
          row = document.createElement("tr");
        }
      }
      if (row.children.length > 0) body.appendChild(row);
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }

    window.onload = fetchAppointments;
  </script>
</body>
</html>
