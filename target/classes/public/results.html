<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab Results</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
 
    h1 { margin-bottom: 20px; }
 
    #patient-info {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #555;
    }
 
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 80%;
    }
 
    th, td {
      border: 1px solid #ccc;
      padding: 10px 16px;
      text-align: center;
    }
 
    th {
      background-color: #4CAF50;
      color: white;
    }
 
    tr:nth-child(even) { background-color: #f2f2f2; }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background-color: #d4edda;
    }
 
    #status-message {
      margin-top: 20px;
      color: #888;
      font-style: italic;
    }

    /*Hover and Click actions*/
    #details-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    #details-modal.open {
      display: flex;
    }

    #modal-content {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 300px;
      text-align: left;
    }

    #modal-content h3 {
      margin-top: 0;
    }

    #modal-content button {
      margin-top: 16px;
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

  </style>
</head>
<body>
 
  <h1>Lab Results</h1>
 
  <!-- Patient name/ID will be filled in by JS -->
  <div id="patient-info"></div>
 
  <table>
    <thead>
      <tr>
        <th>Test Name</th><th>Status</th><th>Date</th>
      </tr>
    </thead>
    <tbody id="lab-results-body">
      <!-- Rows inserted by JavaScript. A static placeholder was removed to avoid malformed markup. -->
    </tbody>
  </table>
 
  <p id="status-message">Loading lab results...</p>
 
  <!-- Modal for test details -->
  <div id="details-modal">
    <div id="modal-content">
      <h3>Test Details</h3>
      <p><strong>Test Name:</strong> <span id="modal-name"></span></p>
      <p><strong>Status:</strong> <span id="modal-status"></span></p>
      <p><strong>Date:</strong> <span id="modal-date"></span></p>
      <p><strong>Notes:</strong> <span id="modal-notes"></span></p>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    // TODO: Replace URL with API endpoint when backend is ready.
    // Expected: GET /api/lab-results?patientId=1
    const PATIENT_ID = 1; // TODO: Replace with dynamic patient ID (e.g. from URL params)
    const API_URL = `/api/lab-results?patientId=${PATIENT_ID}`;
 
    async function loadLabResults() {
      try {
        const response = await fetch(API_URL);
 
        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }
 
        const data = await response.json();
        
        // Display patient info
        document.getElementById("patient-info").textContent =
          `Patient: ${data.patient.name} (ID: ${data.patient.id})`;
 
        // Populate table rows
        const tbody = document.getElementById("lab-results-body");
        tbody.innerHTML = ""; // Clear any existing rows
 
        data.results.forEach(row => {
          const tr = document.createElement("tr");
          tr.dataset.details = JSON.stringify(row); // Store row data for modal
          tr.innerHTML = `
            <td>${row.test_name}</td>
            <td>${row.status}</td>
            <td>${row.date}</td>
          `;
          tbody.appendChild(tr);
        });
 
        document.getElementById("status-message").textContent = "";
 
      } catch (error) {
        // If the backend isn't available yet, provide three fallback demo reports
        console.warn("Error fetching lab results, using fallback demo data:", error);
        const demoPatient = { name: "Demo Patient", id: "demo-1" };
        const fallbackResults = [
          { test_name: "Complete Blood Count", status: "Completed", date: "2024-04-01", notes: "All values within expected range." },
          { test_name: "Metabolic Panel", status: "Pending", date: "2024-04-02", notes: "Sample received; in processing." },
          { test_name: "Lipid Panel", status: "Completed", date: "2024-03-28", notes: "Slightly elevated LDL; recommend follow-up." }
        ];

        document.getElementById("patient-info").textContent =
          `Patient: ${demoPatient.name} (ID: ${demoPatient.id})`;

        const tbody = document.getElementById("lab-results-body");
        tbody.innerHTML = "";
        fallbackResults.forEach(row => {
          const tr = document.createElement("tr");
          tr.dataset.details = JSON.stringify(row);
          tr.innerHTML = `
            <td>${row.test_name}</td>
            <td>${row.status}</td>
            <td>${row.date}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("status-message").textContent =
          "Displaying demo lab reports because the backend could not be reached.";
      }
    }
    
    // Single event listener for tbody via event delegation.
    // When a row is clicked, open the modal using the stored dataset.details
    document.getElementById("lab-results-body").addEventListener("click", function(event) {
      const tr = event.target.closest("tr");
      if (tr && tr.dataset && tr.dataset.details) {
        try {
          showDetails(tr);
        } catch (e) {
          console.error('Failed to show details for row', e);
        }
      }
    });


    function showDetails(row) {
      const details = JSON.parse(row.dataset.details);
      document.getElementById("modal-name").textContent = details.test_name
      document.getElementById("modal-status").textContent = details.status
      document.getElementById("modal-date").textContent = details.date;
      document.getElementById("modal-notes").textContent = details.notes || "";
      document.getElementById("details-modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("details-modal").classList.remove("open");
    }

    // Close modal when clicking outside the content box
    document.getElementById("details-modal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });

    window.onload = function() {
      fetch("/reports")
        .then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load results.html: ${response.status}`);
          }
          return response.text();
      })
      .then(html => {
        console.log("Successfully loaded results.html");
      })
      .catch(error => {
        console.error("Error loading results.html:", error);
      });}
    loadLabResults();
  </script>
 
</body>
</html>
