<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab Results</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
 
    h1 { margin-bottom: 20px; }
 
    #patient-info {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #555;
    }
 
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 80%;
    }
 
    th, td {
      border: 1px solid #ccc;
      padding: 10px 16px;
      text-align: center;
    }
 
    th {
      background-color: #4CAF50;
      color: white;
    }
 
    tr:nth-child(even) { background-color: #f2f2f2; }
 
    #status-message {
      margin-top: 20px;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
 
  <h1>Lab Results</h1>
 
  <!-- Patient name/ID will be filled in by JS -->
  <div id="patient-info"></div>
 
  <table>
    <thead>
      <tr>
        <th>Test Name</th>
        <th>Result</th>
        <th>Unit</th>
        <th>Reference Range</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="lab-results-body">
      <!-- Rows inserted by JavaScript -->
    </tbody>
  </table>
 
  <p id="status-message">Loading lab results...</p>
 
  <script>
    // TODO: Replace URL with API endpoint when backend is ready.
    // Expected: GET /api/lab-results?patientId=1
    const PATIENT_ID = 1; // TODO: Replace with dynamic patient ID (e.g. from URL params)
    const API_URL = `/api/lab-results?patientId=${PATIENT_ID}`;
 
    async function loadLabResults() {
      try {
        const response = await fetch(API_URL);
 
        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }
 
        const data = await response.json();
 
        // Display patient info
        document.getElementById("patient-info").textContent =
          `Patient: ${data.patient.name} (ID: ${data.patient.id})`;
 
        // Populate table rows
        const tbody = document.getElementById("lab-results-body");
        tbody.innerHTML = ""; // Clear any existing rows
 
        data.results.forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.test_name}</td>
            <td>${row.result}</td>
            <td>${row.unit}</td>
            <td>${row.reference_range}</td>
            <td>${row.status}</td>
            <td>${row.date}</td>
          `;
          tbody.appendChild(tr);
        });
 
        document.getElementById("status-message").textContent = "";
 
      } catch (error) {
        document.getElementById("status-message").textContent =
          "Could not load lab results. Please try again later.";
        console.error("Error fetching lab results:", error);
      }
    }
 
    loadLabResults();
  </script>
 
</body>
</html>
